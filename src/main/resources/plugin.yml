name: NMLItems
version: '1.0'
main: io.github.NoOne.nMLItems.NMLItems
api-version: '1.21'
depend:
  - NMLPlayerStats
  - NMLSkills
commands:
  generateArmor:
    description: Generates a random piece of armor
    usage: /<command> <level> <rarity> <weight> <type>
  generateQuiver:
    description: Generates a random quiver
    usage: /<command> <level> <rarity>
  generateHoe:
    description: Generates a random hoe
    usage: /<command> <level> <rarity>
  generateMaterial:
    description: Generates a material item
    usage: /<command> <name> <level> <stars> <amount>
  generateItem:
    description: Generates an item
    usage: /<command> <name>
  generateWeapon:
    description: Generates a random weapon
    usage: /<command> <level> <rarity> <type>